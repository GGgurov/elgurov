<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>elgurov | Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        /* --- ПЕРЕМЕННЫЕ --- */
        :root {
            --bg-dark: #050509;
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --twitch-color: #9146FF;
            --tg-color: #0088cc;
            --kaspi-color: #f14635;
            --vtb-color: #002882;
            --crypto-color: #f3ba2f;
            --dalink-color: #ff3b8f;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --menu-glass: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            /* Аппаратное ускорение для плавности */
            transform: translateZ(0); 
        }

        /* --- ФОН --- */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.1) 0%, transparent 40%),
                linear-gradient(135deg, #050509 0%, #11111d 100%);
            z-index: -1;
            animation: bgPulse 15s ease infinite alternate;
            will-change: transform, opacity;
        }

        @keyframes bgPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* --- КАРТОЧКА --- */
        .main-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 25px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
            animation: cardAppear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: translateY(40px);
            will-change: transform, opacity;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ПРОФИЛЬ --- */
        .profile-area { margin-bottom: 30px; }

        .avatar-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 20px;
            position: relative;
            padding: 5px;
            background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #0a0a12;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        
        .avatar-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .status-dot {
            width: 18px;
            height: 18px;
            background-color: #00ff88;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            right: 5px;
            border: 3px solid #0a0a12;
            z-index: 2;
            box-shadow: 0 0 10px #00ff88;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #b2b9c9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        /* --- КНОПКИ --- */
        .links-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            opacity: 0;
            transform: translateY(20px);
            animation: itemAppear 0.5s ease forwards;
            will-change: transform, opacity;
        }

        /* Задержки */
        .link-item:nth-child(1) { animation-delay: 0.2s; }
        .link-item:nth-child(2) { animation-delay: 0.3s; }
        .link-item:nth-child(3) { animation-delay: 0.4s; }
        .link-item:nth-child(4) { animation-delay: 0.5s; }
        .link-item:nth-child(5) { animation-delay: 0.6s; }
        .link-item:nth-child(6) { animation-delay: 0.7s; }
        .link-item:nth-child(7) { animation-delay: 0.8s; }

        @keyframes itemAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-action {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 18px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .btn-action i.main-icon {
            font-size: 24px;
            margin-right: 15px;
            width: 30px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .btn-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .btn-title { font-size: 15px; }
        .btn-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 2px;
        }

        .arrow-icon {
            font-size: 12px;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        /* Общий ховер */
        .btn-action:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-action:active { transform: scale(0.98); }

        /* --- 1. ДОНЕЙШН АЛЕРТС (СУПЕР АНИМАЦИЯ) --- */
        .btn-donate-mega {
            background: linear-gradient(270deg, #ff9f43, #ff4757, #ff9f43);
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
            border: 1px solid rgba(255, 159, 67, 0.6);
            box-shadow: 0 5px 25px rgba(255, 71, 87, 0.3);
        }
        
        .btn-donate-mega .btn-title, .btn-donate-mega .btn-subtitle, .btn-donate-mega i {
            color: #fff !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-donate-mega:hover {
            box-shadow: 0 8px 35px rgba(255, 71, 87, 0.5);
            transform: translateY(-3px) scale(1.02);
        }

        /* --- 2. DALINK --- */
        .btn-dalink i.main-icon { color: var(--dalink-color); }
        .btn-dalink:hover {
            color: var(--dalink-color);
            box-shadow: 0 0 20px rgba(255, 59, 143, 0.15);
        }

        /* --- 3. КАСПИ БАНК --- */
        .btn-kaspi i.main-icon { color: var(--kaspi-color); }
        .btn-kaspi.active {
            background: rgba(241, 70, 53, 0.1);
            border-color: rgba(241, 70, 53, 0.3);
        }
        
        /* --- 4. ВТБ БАНК --- */
        .btn-vtb i.main-icon { color: #00a3ff; }
        .btn-vtb.active {
            background: rgba(0, 163, 255, 0.1);
            border-color: rgba(0, 163, 255, 0.3);
        }

        /* --- 5. TELEGRAM --- */
        .btn-tg i.main-icon { color: var(--tg-color); }
        .btn-tg:hover {
            color: var(--tg-color);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.15);
        }

        /* --- 6. TWITCH --- */
        .btn-twitch i.main-icon { color: var(--twitch-color); }
        .btn-twitch:hover {
            color: var(--twitch-color);
            box-shadow: 0 0 20px rgba(145, 70, 255, 0.15);
        }

        /* --- 7. КРИПТА --- */
        .btn-crypto i.main-icon { color: var(--crypto-color); }
        .btn-crypto:hover {
            color: var(--crypto-color);
            box-shadow: 0 0 20px rgba(243, 186, 47, 0.15);
        }

        /* --- ВЫПАДАЮЩЕЕ МЕНЮ (ДЛЯ БАНКОВ) --- */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            background: var(--menu-glass);
            border-radius: 0 0 18px 18px;
            margin-top: -10px;
            padding: 0 10px;
            opacity: 0;
            transform: translateY(-10px);
        }

        .submenu.open {
            opacity: 1;
            transform: translateY(0);
            padding: 15px 10px 10px 10px;
            margin-bottom: 5px;
        }

        .sub-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        
        .sub-btn:last-child { margin-bottom: 0; }

        .sub-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.02);
        }
        .sub-btn i { font-size: 14px; opacity: 0.7; }

        /* Вращение стрелочки при открытии */
        .btn-action.active .arrow-icon {
            transform: rotate(180deg);
            opacity: 1;
        }

        /* --- УВЕДОМЛЕНИЯ --- */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            background: rgba(10, 10, 18, 0.95);
            color: #fff;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--primary-neon);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 14px;
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast i { color: var(--primary-neon); font-size: 18px; }

        /* Подвал */
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* Мобилки */
        @media (max-width: 480px) {
            body { padding: 15px; align-items: flex-start; }
            .main-card { padding: 30px 20px; border-radius: 25px; }
            h1 { font-size: 24px; }
            .btn-action { padding: 16px 20px; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="profile-area">
            <div class="avatar-wrapper">
                <div class="avatar-img">
                    <img src="avatar.jpg" alt="elgurov" />
                </div>
                <div class="status-dot"></div>
            </div>
            <h1>elgurov</h1>
            <p class="description"></p>
        </div>

        <ul class="links-list">
            
            <li class="link-item">
                <a href="https://www.donationalerts.com/r/elgurov" target="_blank" class="btn-action btn-donate-mega">
                    <i class="fa-solid fa-fire main-icon"></i>
                    <div class="btn-content">
                        <span class="btn-title">Донаты из РФ и СНГ</span>
                        <span class="btn-subtitle">Поддержи стримера (Алерт на экран)</span>
                    </div>
                    <i class="fa-solid fa-bolt arrow-icon"></i>
                </a>
            </li>

            <li class="link-item">
                <a href="https://dalink.to/elgurov" target="_blank" class="btn-action btn-dalink">
                    <i class="fa-solid fa-link main-icon"></i>
                    <div class="btn-content">
                        <span class="btn-title">Dalink (Альтернатива)</span>
                        <span class="btn-subtitle">Еще один способ поддержать</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>
            </li>

            <li class="link-item">
                <div class="expand-container">
                    <button class="btn-action btn-kaspi toggle-menu">
                        <i class="fa-solid fa-credit-card main-icon"></i>
                        <div class="btn-content">
                            <span class="btn-title">Kaspi Bank (Казахстан)</span>
                            <span class="btn-subtitle">Нажми, чтобы открыть реквизиты</span>
                        </div>
                        <i class="fa-solid fa-chevron-down arrow-icon"></i>
                    </button>
                    <div class="submenu">
                        <button class="sub-btn" onclick="copyToClipboard('4400430366330691', 'Номер карты Kaspi')">
                            Номер карты <span><i class="fa-regular fa-copy"></i></span>
                        </button>
                        <button class="sub-btn" onclick="copyToClipboard('7471242778', 'Номер телефона Kaspi')">
                            По номеру телефона <span><i class="fa-regular fa-copy"></i></span>
                        </button>
                    </div>
                </div>
            </li>

            <li class="link-item">
                <div class="expand-container">
                    <button class="btn-action btn-vtb toggle-menu">
                        <i class="fa-solid fa-building-columns main-icon"></i>
                        <div class="btn-content">
                            <span class="btn-title">ВТБ (Прямой из РФ)</span>
                            <span class="btn-subtitle">Нажми, чтобы открыть реквизиты</span>
                        </div>
                        <i class="fa-solid fa-chevron-down arrow-icon"></i>
                    </button>
                    <div class="submenu">
                        <button class="sub-btn" onclick="copyToClipboard('2204360100149580', 'Номер карты ВТБ')">
                            Скопировать карту <span><i class="fa-regular fa-copy"></i></span>
                        </button>
                        <button class="sub-btn" onclick="copyToClipboard('VLADISLAV GUROV', 'Имя получателя')">
                            Скопировать имя (ENG) <span><i class="fa-regular fa-copy"></i></span>
                        </button>
                    </div>
                </div>
            </li>

            <li class="link-item">
                <a href="https://t.me/elgurov" target="_blank" class="btn-action btn-tg">
                    <i class="fa-brands fa-telegram main-icon"></i>
                    <div class="btn-content">
                        <span class="btn-title">Telegram Канал</span>
                        <span class="btn-subtitle">Анонсы, новости и общение</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>
            </li>

            <li class="link-item">
                <a href="https://www.twitch.tv/elgurov" target="_blank" class="btn-action btn-twitch">
                    <i class="fa-brands fa-twitch main-icon"></i>
                    <div class="btn-content">
                        <span class="btn-title">Twitch Канал</span>
                        <span class="btn-subtitle">Смотри прямые трансляции здесь</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>
            </li>

            <li class="link-item">
                <button class="btn-action btn-crypto" onclick="copyToClipboard('0x06a300e8b8c459ae210432203bdf12e02e301798', 'BEP20 адрес')">
                    <i class="fa-solid fa-wallet main-icon"></i>
                    <div class="btn-content">
                        <span class="btn-title">Крипта (USDT BEP20)</span>
                        <span class="btn-subtitle">Скопировать адрес кошелька</span>
                    </div>
                    <i class="fa-regular fa-copy arrow-icon"></i>
                </button>
            </li>

        </ul>

        <footer>© elgurov</footer>
    </div>

    <div id="toast-container">
        <div class="toast" id="copy-toast">
            <i class="fa-solid fa-circle-check"></i>
            <span id="toast-message">Скопировано!</span>
        </div>
    </div>

    <script>
        // --- ЛОГИКА ВЫПАДАЮЩИХ МЕНЮ ---
        document.querySelectorAll('.toggle-menu').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const submenu = this.nextElementSibling;
                const parent = this.parentElement;
                
                // Закрываем остальные меню
                document.querySelectorAll('.submenu').forEach(menu => {
                    if (menu !== submenu) {
                        menu.classList.remove('open');
                        menu.style.maxHeight = null;
                        menu.previousElementSibling.classList.remove('active');
                    }
                });

                // Тогглим текущее
                if (submenu.classList.contains('open')) {
                    submenu.classList.remove('open');
                    submenu.style.maxHeight = null;
                    this.classList.remove('active');
                } else {
                    submenu.classList.add('open');
                    submenu.style.maxHeight = submenu.scrollHeight + 30 + "px"; // +30px для паддингов
                    this.classList.add('active');
                }
            });
        });

        // --- ЛОГИКА КОПИРОВАНИЯ ---
        function copyToClipboard(textToCopy, label) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showToast(label + ' скопирован!');
                }).catch(err => {
                    fallbackCopy(textToCopy, label);
                });
            } else {
                fallbackCopy(textToCopy, label);
            }
        }

        function fallbackCopy(text, label) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) showToast(label + ' скопирован!');
            } catch (err) {}
            document.body.removeChild(textArea);
        }

        // --- УВЕДОМЛЕНИЯ ---
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('copy-toast');
            const toastMsg = document.getElementById('toast-message');
            
            toastMsg.textContent = message;
            toast.classList.remove('show');
            clearTimeout(toastTimeout);
            
            void toast.offsetWidth; // Рестарт анимации
            toast.classList.add('show');

            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
            
            // Вибрация (если поддерживается)
            if ('vibrate' in navigator) navigator.vibrate(50);
        }
    </script>
</body>
</html>
